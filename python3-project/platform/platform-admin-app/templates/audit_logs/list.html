{% extends "admin_layout.html" %}

{% set active_menu = 'system:audit' %}
{% block page_title %}审计日志{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0"><i class="bi bi-journal-text me-2"></i>审计日志</h4>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="row g-2 mb-3">
                <div class="col-md-3">
                    <input type="text" id="filterAction" class="form-control" placeholder="操作类型">
                </div>
                <div class="col-md-3">
                    <input type="text" id="filterModule" class="form-control" placeholder="模块">
                </div>
                <div class="col-md-3">
                    <input type="text" id="filterUsername" class="form-control" placeholder="用户名">
                </div>
                <div class="col-md-3">
                    <button class="btn btn-primary" onclick="loadAuditLogs(1)"><i class="bi bi-search me-1"></i>查询</button>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>用户</th>
                            <th>操作</th>
                            <th>模块</th>
                            <th>描述</th>
                            <th>IP 地址</th>
                            <th>状态</th>
                            <th>时间</th>
                        </tr>
                    </thead>
                    <tbody id="auditLogTableBody">
                        <tr><td colspan="8" class="text-center text-muted">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
            <div id="pagination" class="d-flex justify-content-center"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
async function loadAuditLogs(page = 1) {
    const action = document.getElementById('filterAction').value;
    const module = document.getElementById('filterModule').value;
    const username = document.getElementById('filterUsername').value;

    const params = new URLSearchParams({ page, page_size: 10 });
    if (action) params.append('action', action);
    if (module) params.append('module', module);
    if (username) params.append('username', username);

    const data = await apiFetch(`/api/audit-logs?${params.toString()}`);
    if (!data || data.code !== 200) {
        showToast(data ? data.message : '加载失败', 'danger');
        return;
    }

    const result = data.data;
    const tbody = document.getElementById('auditLogTableBody');
    if (!result.items || result.items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">暂无数据</td></tr>';
    } else {
        tbody.innerHTML = result.items.map(item => `
            <tr>
                <td>${item.id}</td>
                <td>${escapeHtml(item.username || '-')}</td>
                <td><span class="badge bg-secondary">${escapeHtml(item.action)}</span></td>
                <td>${escapeHtml(item.module || '-')}</td>
                <td>${escapeHtml(item.description || '-')}</td>
                <td>${escapeHtml(item.ip_address || '-')}</td>
                <td>${item.status ? '<span class="badge bg-success">成功</span>' : '<span class="badge bg-danger">失败</span>'}</td>
                <td>${formatDate(item.created_at)}</td>
            </tr>
        `).join('');
    }
    renderPagination('pagination', result.total, result.page, result.page_size);
}

document.addEventListener('DOMContentLoaded', () => loadAuditLogs(1));
</script>
{% endblock %}
