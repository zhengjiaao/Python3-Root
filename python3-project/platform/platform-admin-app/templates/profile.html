{% extends "admin_layout.html" %}

{% block page_title %}个人中心{% endblock %}

{% block content %}
<div class="container-fluid">
    <h4 class="mb-4">个人中心</h4>

    <div class="row">
        <!-- 个人资料 -->
        <div class="col-md-6">
            <div class="card">
                <div class="card-header"><i class="bi bi-person-badge"></i> 个人资料</div>
                <div class="card-body">
                    <form id="profileForm">
                        <div class="mb-3">
                            <label class="form-label">用户名</label>
                            <input type="text" class="form-control" id="pUsername" disabled>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">昵称</label>
                            <input type="text" class="form-control" id="pNickname" placeholder="请输入昵称">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">邮箱</label>
                            <input type="email" class="form-control" id="pEmail" placeholder="请输入邮箱">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">手机号</label>
                            <input type="text" class="form-control" id="pPhone" placeholder="请输入手机号">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">性别</label>
                            <select class="form-select" id="pGender">
                                <option value="0">未知</option>
                                <option value="1">男</option>
                                <option value="2">女</option>
                            </select>
                        </div>
                        <button type="button" class="btn btn-primary" onclick="saveProfile()">
                            <i class="bi bi-check-lg"></i> 保存资料
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- 修改密码 -->
        <div class="col-md-6">
            <div class="card">
                <div class="card-header"><i class="bi bi-key"></i> 修改密码</div>
                <div class="card-body">
                    <form id="passwordForm">
                        <div class="mb-3">
                            <label class="form-label">旧密码 <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" id="oldPassword" placeholder="请输入旧密码" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">新密码 <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" id="newPassword" placeholder="至少6位，包含字母和数字" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">确认新密码 <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" id="confirmPassword" placeholder="再次输入新密码" required>
                        </div>
                        <button type="button" class="btn btn-warning" onclick="changePassword()">
                            <i class="bi bi-pencil-square"></i> 修改密码
                        </button>
                    </form>
                </div>
            </div>

            <!-- 账号信息 -->
            <div class="card mt-3">
                <div class="card-header"><i class="bi bi-info-circle"></i> 账号信息</div>
                <div class="card-body">
                    <table class="table table-sm table-borderless mb-0">
                        <tr><th width="100">用户名</th><td id="infoUsername">-</td></tr>
                        <tr><th>角色</th><td id="infoRoles">-</td></tr>
                        <tr><th>权限数</th><td id="infoPermCount">-</td></tr>
                        <tr><th>最后登录</th><td id="infoLastLogin">-</td></tr>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let currentUserId = null;

async function loadProfile() {
    const data = await apiFetch('/api/auth/me');
    if (!data || data.code !== 200) return;
    const u = data.data;
    currentUserId = u.id;
    document.getElementById('pUsername').value = u.username;
    document.getElementById('pNickname').value = u.nickname || '';
    document.getElementById('pEmail').value = '';
    document.getElementById('pPhone').value = '';
    document.getElementById('pGender').value = '0';

    // 加载完整用户信息（包含 email/phone/gender）
    const fullData = await apiFetch(`/api/users/${u.id}`);
    if (fullData && fullData.code === 200) {
        const fu = fullData.data;
        document.getElementById('pEmail').value = fu.email || '';
        document.getElementById('pPhone').value = fu.phone || '';
        document.getElementById('pGender').value = fu.gender;
    }

    // 账号信息
    document.getElementById('infoUsername').textContent = u.username;
    document.getElementById('infoRoles').innerHTML = u.roles.map(r =>
        `<span class="badge bg-primary">${escapeHtml(r.name)}</span>`
    ).join(' ') || '-';
    document.getElementById('infoPermCount').textContent = u.permissions ? u.permissions.length + ' 个' : '-';
}

async function saveProfile() {
    const payload = {
        nickname: document.getElementById('pNickname').value || null,
        email: document.getElementById('pEmail').value || null,
        phone: document.getElementById('pPhone').value || null,
        gender: parseInt(document.getElementById('pGender').value),
    };
    const data = await apiFetch('/api/auth/profile', { method: 'PUT', body: payload });
    if (data && data.code === 200) {
        showToast('资料保存成功', 'success');
        // 更新顶栏用户名
        const nickname = payload.nickname || document.getElementById('pUsername').value;
        const nameEl = document.getElementById('currentUserName');
        if (nameEl) nameEl.textContent = nickname;
    } else {
        showToast(data.message || '保存失败', 'danger');
    }
}

async function changePassword() {
    const oldPwd = document.getElementById('oldPassword').value;
    const newPwd = document.getElementById('newPassword').value;
    const confirmPwd = document.getElementById('confirmPassword').value;

    if (!oldPwd || !newPwd || !confirmPwd) {
        showToast('请填写所有密码字段', 'warning');
        return;
    }
    if (newPwd !== confirmPwd) {
        showToast('两次输入的新密码不一致', 'warning');
        return;
    }
    if (newPwd.length < 6) {
        showToast('新密码至少6个字符', 'warning');
        return;
    }

    const data = await apiFetch(`/api/users/${currentUserId}/change-password`, {
        method: 'PUT',
        body: { old_password: oldPwd, new_password: newPwd },
    });
    if (data && data.code === 200) {
        showToast('密码修改成功，请重新登录', 'success');
        document.getElementById('passwordForm').reset();
        // 3秒后自动退出
        setTimeout(async () => {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/login';
        }, 2000);
    } else {
        showToast(data.message || '密码修改失败', 'danger');
    }
}

loadProfile();
</script>
{% endblock %}
