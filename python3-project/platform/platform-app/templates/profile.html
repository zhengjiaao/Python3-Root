{% extends "base.html" %}

{% block title %}个人中心 - 平台应用端{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-header bg-white">
                    <h5 class="mb-0"><i class="bi bi-person-circle me-2"></i>个人资料</h5>
                </div>
                <div class="card-body p-4">
                    <form id="profileForm" onsubmit="updateProfile(event)">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">用户名</label>
                                <input type="text" class="form-control" value="{{ user.username }}" disabled>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">昵称</label>
                                <input type="text" class="form-control" id="nickname" name="nickname" value="{{ user.nickname or '' }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">邮箱</label>
                                <input type="email" class="form-control" id="email" name="email" value="{{ user.email or '' }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">手机号</label>
                                <input type="text" class="form-control" id="phone" name="phone" value="{{ user.phone or '' }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">性别</label>
                                <select class="form-select" id="gender" name="gender">
                                    <option value="0" {% if user.gender == 0 %}selected{% endif %}>未知</option>
                                    <option value="1" {% if user.gender == 1 %}selected{% endif %}>男</option>
                                    <option value="2" {% if user.gender == 2 %}selected{% endif %}>女</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">部门</label>
                                <input type="text" class="form-control" value="{{ user.department.name if user.department else '' }}" disabled>
                            </div>
                        </div>
                        <div class="d-flex justify-content-end">
                            <button type="submit" class="btn btn-primary" id="saveProfileBtn">
                                <span class="spinner-border spinner-border-sm d-none" id="profileSpinner"></span>
                                保存修改
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0"><i class="bi bi-shield-lock me-2"></i>修改密码</h5>
                </div>
                <div class="card-body p-4">
                    <form id="pwdForm" onsubmit="changePassword(event)">
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">原密码</label>
                                <input type="password" class="form-control" id="oldPassword" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">新密码</label>
                                <input type="password" class="form-control" id="newPassword" required minlength="8">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">确认新密码</label>
                                <input type="password" class="form-control" id="confirmPassword" required minlength="8">
                            </div>
                        </div>
                        <div class="d-flex justify-content-end">
                            <button type="submit" class="btn btn-warning" id="savePwdBtn">
                                <span class="spinner-border spinner-border-sm d-none" id="pwdSpinner"></span>
                                修改密码
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
async function updateProfile(e) {
    e.preventDefault();
    const btn = document.getElementById('saveProfileBtn');
    const spinner = document.getElementById('profileSpinner');
    btn.disabled = true;
    spinner.classList.remove('d-none');

    const data = {
        nickname: document.getElementById('nickname').value || null,
        email: document.getElementById('email').value || null,
        phone: document.getElementById('phone').value || null,
        gender: parseInt(document.getElementById('gender').value),
    };

    try {
        const res = await fetch('/api/profile/me', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data),
        });
        const json = await res.json();
        if (json.code === 200) {
            showToast('资料更新成功', 'success');
            if (json.data && json.data.nickname) {
                document.getElementById('navNickname').textContent = json.data.nickname;
            }
        } else {
            showToast(json.message || '更新失败', 'danger');
        }
    } catch (err) {
        showToast('网络错误', 'danger');
    } finally {
        btn.disabled = false;
        spinner.classList.add('d-none');
    }
}

async function changePassword(e) {
    e.preventDefault();
    const oldPwd = document.getElementById('oldPassword').value;
    const newPwd = document.getElementById('newPassword').value;
    const confirmPwd = document.getElementById('confirmPassword').value;

    if (newPwd !== confirmPwd) {
        showToast('两次输入的新密码不一致', 'danger');
        return;
    }

    const btn = document.getElementById('savePwdBtn');
    const spinner = document.getElementById('pwdSpinner');
    btn.disabled = true;
    spinner.classList.remove('d-none');

    try {
        const res = await fetch('/api/profile/change-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ old_password: oldPwd, new_password: newPwd }),
        });
        const json = await res.json();
        if (json.code === 200) {
            showToast('密码修改成功', 'success');
            document.getElementById('pwdForm').reset();
        } else {
            showToast(json.message || '修改失败', 'danger');
        }
    } catch (err) {
        showToast('网络错误', 'danger');
    } finally {
        btn.disabled = false;
        spinner.classList.add('d-none');
    }
}
</script>
{% endblock %}
